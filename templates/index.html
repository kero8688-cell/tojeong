<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>토정비결 — 나의 운세</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="page-wrap">
    <header class="site-header">
      <div class="header-ornament">✦</div>
      <h1>土亭秘訣</h1>
      <p class="subtitle">토정비결 — 이지함 선생의 지혜로 풀어보는 한 해의 운세</p>
      <div class="header-ornament">✦</div>
    </header>

    <main class="card">
      <h2 class="card-title">생년월일을 입력하세요</h2>
      <form action="/result" method="post" class="form">
        <div class="form-row">
          <label>성명 (선택)</label>
          <input type="text" name="name" placeholder="홍길동" maxlength="10" />
        </div>

        <div class="form-row">
          <label>성별</label>
          <div class="radio-group">
            <label class="radio-label"><input type="radio" name="gender" value="남" checked /> 남</label>
            <label class="radio-label"><input type="radio" name="gender" value="여" /> 여</label>
          </div>
        </div>

        <fieldset class="fieldset">
          <legend>생년월일 (양력)</legend>
          <div class="date-row">
            <div class="date-field">
              <label>연도</label>
              <input type="number" name="birth_year" min="1900" max="2025"
                     placeholder="예) 1990" required />
            </div>
            <div class="date-field">
              <label>월</label>
              <select name="birth_month" required>
                {% for m in range(1,13) %}
                <option value="{{ m }}">{{ m }}월</option>
                {% endfor %}
              </select>
            </div>
            <div class="date-field">
              <label>일</label>
              <select name="birth_day" required>
                {% for d in range(1,32) %}
                <option value="{{ d }}">{{ d }}일</option>
                {% endfor %}
              </select>
            </div>
          </div>
        </fieldset>

        <fieldset class="fieldset">
          <legend>출생 시각 (선택 — 30분 단위)</legend>
          <div class="date-row">
            <div class="date-field" style="flex:2">
              <label>시각</label>
              <select name="birth_time">
                <option value="-1">모름 / 미입력</option>
                {% for h in range(0, 24) %}
                  {% for m in [0, 30] %}
                  <option value="{{ '%02d:%02d' % (h, m) }}">{{ '%02d:%02d' % (h, m) }}</option>
                  {% endfor %}
                {% endfor %}
              </select>
            </div>
            <div class="date-field" style="flex:3; justify-content:flex-end; padding-top:18px;">
              <span class="time-hint">※ 시각을 알면 하괘(下卦)가 더 정밀하게 계산됩니다.</span>
            </div>
          </div>
        </fieldset>

        <div class="form-row">
          <label>운세 보기 연도</label>
          <input type="number" name="target_year" min="2000" max="2100"
                 value="{{ current_year }}" required />
        </div>

        <button type="submit" class="btn-submit">✦ 비결 열람 ✦</button>
      </form>
    </main>

    <footer class="site-footer">
      <p>본 토정비결은 전통 역학을 바탕으로 재현한 것으로, 오락 목적으로만 활용하십시오.</p>
    </footer>
  </div>
</body>
</html>
